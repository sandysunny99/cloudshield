services:
  - type: web
    name: cloudshield-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AGENT_KEYS
        value: default-agent-key-123
      - key: ALLOWED_ORIGINS
        value: https://cloudshield-vtah.vercel.app,http://localhost:5173
      - key: CF_API_TOKEN
        value: your-cloudflare-api-token
      - key: CF_ZONE_ID
        value: your-cloudflare-zone-id
      - key: CF_ACCOUNT_ID
        value: your-cloudflare-account-id
