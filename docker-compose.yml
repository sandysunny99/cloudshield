version: "3.9"

services:
  # ── Core Services ──
  redis:
    image: redis:7-alpine
    container_name: cloudshield-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: cloudshield-api
    ports:
      - "5000:5000"
    environment:
      - REDIS_URL=redis://redis:6379
      - TRIVY_SERVER_URL=http://trivy:4954
      - WAZUH_API_URL=https://wazuh.local:55000
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    container_name: cloudshield-worker
    command: python worker.py
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Vulnerability Scanner ──
  trivy:
    image: aquasec/trivy:latest
    container_name: cloudshield-trivy
    command: server --listen 0.0.0.0:4954
    ports:
      - "4954:4954"

